<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rushikweb</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top left, #ff9a9e, transparent 35%),
                        radial-gradient(circle at bottom right, #fad0c4, transparent 40%),
                        linear-gradient(135deg, #5ee7df 0%, #b490ca 100%);
            color: #1d1d2c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            width: min(96vw, 680px);
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(41, 87, 150, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #3b2d8a;
            font-size: clamp(3rem, 4vw, 4.5rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 1px 1px 12px rgba(93, 58, 184, 0.22);
        }

        p {
            margin: 1rem auto 2rem;
            max-width: 28rem;
            color: #4b4b66;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .controls {
            display: grid;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            border: 2px solid rgba(91, 49, 177, 0.18);
            box-shadow: inset 0 8px 24px rgba(93, 58, 184, 0.08);
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        textarea:focus {
            transform: translateY(-2px);
            border-color: #5d3ab8;
            box-shadow: 0 0 0 4px rgba(93, 58, 184, 0.12);
        }

        button {
            min-width: 180px;
            margin: 0 auto;
            padding: 0.95rem 1.8rem;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #6b73ff 0%, #000dff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 16px 30px rgba(27, 82, 255, 0.25);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 32px rgba(27, 82, 255, 0.3);
        }

        .badge {
            display: inline-flex;
            background: #ffe066;
            color: #5f3dc4;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 24px rgba(255, 179, 0, 0.15);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Bright &amp; Colorful</span>
        <h1>Hello World</h1>
        <p>Welcome to my website! Explore colorful gradients, soft shadows, and a fresh modern layout designed for a lively first impression.</p>
        <div class="controls">
            <textarea placeholder="Enter your message here..."></textarea>
            <button>Click Me!</button>
        </div>
    </div>
</body>
</html>
